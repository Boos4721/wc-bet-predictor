name: build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # 需要在 tag 推送时创建 Release

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - name: linux-aarch64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            ext: ""
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            ext: ""
          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            ext: ""
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      # ---- 前端:必须先构建,rust-embed 在编译期嵌入 frontend/dist ----
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Build frontend
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run build

      # ---- Rust 工具链 + 缓存 ----
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Test
        working-directory: backend
        run: cargo test --release --target ${{ matrix.target }}

      - name: Build release binary
        working-directory: backend
        run: cargo build --release --target ${{ matrix.target }}

      # ---- 组装产物 ----
      - name: Package (unix)
        if: matrix.ext == ''
        shell: bash
        run: |
          VER=$(grep -m1 '^version' backend/Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          PKG="wc-bet-predictor-${VER}-${{ matrix.name }}"
          mkdir -p "dist/$PKG"
          cp "backend/target/${{ matrix.target }}/release/wc-bet-predictor" "dist/$PKG/"
          cp README.md "dist/$PKG/" || true
          printf '#!/usr/bin/env bash\ncd "$(dirname "${BASH_SOURCE[0]}")"\nexec ./wc-bet-predictor\n' > "dist/$PKG/run.sh"
          chmod +x "dist/$PKG/run.sh" "dist/$PKG/wc-bet-predictor"
          tar -C dist -czf "dist/$PKG.tar.gz" "$PKG"
          echo "ASSET=dist/$PKG.tar.gz" >> "$GITHUB_ENV"
          echo "PKG=$PKG" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.ext == '.exe'
        shell: bash
        run: |
          VER=$(grep -m1 '^version' backend/Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          PKG="wc-bet-predictor-${VER}-${{ matrix.name }}"
          mkdir -p "dist/$PKG"
          cp "backend/target/${{ matrix.target }}/release/wc-bet-predictor.exe" "dist/$PKG/"
          cp README.md "dist/$PKG/" || true
          printf '@echo off\r\ncd /d "%%~dp0"\r\nwc-bet-predictor.exe\r\n' > "dist/$PKG/run.bat"
          cd dist && 7z a "$PKG.zip" "$PKG" >/dev/null
          echo "ASSET=dist/$PKG.zip" >> "$GITHUB_ENV"
          echo "PKG=$PKG" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

      # ---- tag 推送:把产物附到 GitHub Release ----
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
